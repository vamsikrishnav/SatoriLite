<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Offline-first markdown editor">
  <meta name="theme-color" content="#cba6f7">
  <title>SatoriLite</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Literata:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/satori.css">
  <script type="importmap">
  {
    "imports": {
      "codemirror-bundle": "./lib/codemirror-bundle.js",
      "marked": "./lib/marked.js",
      "minisearch": "./lib/minisearch.js"
    }
  }
  </script>
</head>
<body>
  <!-- Vault Chooser — full screen, shown on launch -->
  <div class="vault-chooser" id="vault-chooser">
    <div class="vault-chooser-card">
      <h1 class="vault-chooser-title"><span class="vault-chooser-kanji">悟</span> SatoriLite</h1>
      <p class="vault-chooser-subtitle">Open a folder to get started</p>

      <!-- Vault list -->
      <div class="vault-list" id="vault-list"></div>
      <button class="btn btn-primary" id="btn-open-folder">Open Folder</button>
    </div>
  </div>

  <!-- App Layout — hidden until vault chosen -->
  <div class="app-layout hidden" id="app-layout">
    <aside class="sidebar-left" id="sidebar-left">
      <!-- File tree will be rendered here -->
    </aside>
    <main class="editor-area" id="editor-area">
      <div class="view-toggle" id="view-toggle">
        <button class="toolbar-btn" id="btn-sidebar" title="Toggle Sidebar (Cmd+B)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <span class="toolbar-divider"></span>
        <button class="view-toggle-btn active" data-mode="split" title="Split view (Cmd+Shift+S)">Split</button>
        <button class="view-toggle-btn" data-mode="editor" title="Editor only (Cmd+Shift+E)">Editor</button>
        <button class="view-toggle-btn" data-mode="preview" title="Preview only (Cmd+Shift+P)">Preview</button>
        <span class="toolbar-spacer"></span>
        <button class="toolbar-btn" id="btn-find" title="Find (Cmd+F)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-toc" title="Table of Contents (Cmd+Shift+O)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-chat" title="AI Chat (Cmd+Shift+L)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="toolbar-btn" id="btn-theme" title="Theme (Cmd+Shift+T)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
      <div class="tab-bar" id="tab-bar"></div>
      <div class="breadcrumb-bar" id="breadcrumb-bar"></div>
      <div class="editor-content mode-split">
        <div class="editor-pane" id="editor-pane"></div>
        <div class="preview-pane" id="preview-pane"></div>
      </div>
    </main>
    <aside class="sidebar-right collapsed" id="sidebar-right">
      <div class="resize-handle resize-handle-right" id="resize-handle-right"></div>
      <div class="sidebar-right-panel active" id="panel-outline">
        <div class="toc-header">Table of Contents</div>
        <div class="toc-list" id="toc-list"></div>
        <div class="backlinks-header">Backlinks</div>
        <div class="backlinks-list" id="backlinks-list"></div>
      </div>
      <div class="sidebar-right-panel" id="panel-chat"></div>
    </aside>
    <footer class="status-bar" id="status-bar">
      <div class="status-bar-left">
        <span class="ws-status-dot" id="ws-status-dot" title="Live reload disconnected"></span>
        <span class="status-item" id="status-path"></span>
      </div>
      <div class="status-bar-right">
        <button class="status-item status-clickable" id="status-words" title="Click to toggle reading time"></button>
        <span class="status-item" id="status-chars"></span>
        <span class="status-item" id="status-tokens" title="Estimated LLM tokens (~4 chars/token)"></span>
      </div>
    </footer>
  </div>

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(
          (registration) => {
            console.log('ServiceWorker registered:', registration.scope);
          },
          (err) => {
            console.log('ServiceWorker registration failed:', err);
          }
        );
      });
    }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
